name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get install -y ninja-build wget xz-utils

      - name: Download prebuilt LLVM 17
        run: |
          wget -q https://github.com/llvm/llvm-project/releases/download/llvmorg-17.0.6/clang+llvm-17.0.6-x86_64-linux-gnu-ubuntu-22.04.tar.xz
          tar -xf clang+llvm-17.0.6-x86_64-linux-gnu-ubuntu-22.04.tar.xz
          echo "LLVM_BUILD=$PWD/clang+llvm-17.0.6-x86_64-linux-gnu-ubuntu-22.04" >> $GITHUB_ENV

      - name: Configure MLIR pass (CPU only)
        run: |
          mkdir -p mlir-pass/build && cd mlir-pass/build
          cmake -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=/usr/bin/gcc \
            -DCMAKE_CXX_COMPILER=/usr/bin/g++ \
            -DMLIR_DIR=$LLVM_BUILD/lib/cmake/mlir \
            -DLLVM_DIR=$LLVM_BUILD/lib/cmake/llvm \
            -DLLVM_ENABLE_ZSTD=OFF \
            -DLLMBoost_SKIP_CUDA=ON \
            ..

      - name: Build MLIR pass library
        run: cd mlir-pass/build && ninja MLIRLLMTransforms

      - name: Verify build
        run: echo "MLIR pass library built successfully"
